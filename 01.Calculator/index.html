<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

</head>

<body>
    <main>
        <div class="screen">
            <div class="current-result" id="current-result">0</div>
            <div class="current-number" id="current-number">0</div>

        </div>
        <div class="buttons">
            <!-- <button class="operation" id="percent">%</button> -->
            <button id="clear">C</button>
            <button id="delete">DEL</button>
            <button class="operation" id="divide">/</button>
            <button class="numberButton">7</button>
            <button class="numberButton">8</button>
            <button class="numberButton">9</button>
            <button class="operation" id="multiply">*</button>
            <button class="numberButton">4</button>
            <button class="numberButton">5</button>
            <button class="numberButton">6</button>
            <button class="operation" id="minus">-</button>
            <button class="numberButton">1</button>
            <button class="numberButton">2</button>
            <button class="numberButton">3</button>
            <button class="operation" id="add">+</button>
            <!-- <button class="operation" id="sign">+/-</button> -->
            <button class="numberButton">0</button>
            <button class="numberButton">.</button>
            <button id="equals">=</button>
        </div>
        <br><br><br><br><br>
        <div id="result"></div>


    </main>

    <script src="script.js"></script>
</body>

</html>
